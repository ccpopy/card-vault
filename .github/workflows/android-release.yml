name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Rename APK
        run: |
          tag="${GITHUB_REF_NAME}"
          mkdir -p release
          cp app/build/outputs/apk/debug/app-debug.apk "release/CardVault-${tag}-debug.apk"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CardVault-${{ github.ref_name }}-debug-apk
          path: release/*.apk
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" release/*.apk \
            --repo "$GITHUB_REPOSITORY" \
            --title "CardVault $TAG_NAME" \
            --notes "Automated Android debug APK build for $TAG_NAME." \
            --verify-tag
