name: Android Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-apk:
    name: Build release APKs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Validate release signing secrets
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf '::error::Missing release signing secrets: %s\n' "${missing[*]}"
            exit 1
          fi

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build release APKs
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Collect APKs
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          mkdir -p release
          for apk in app/build/outputs/apk/release/*-release.apk; do
            file="$(basename "$apk")"
            case "$file" in
              *arm64-v8a*) abi="arm64-v8a" ;;
              *armeabi-v7a*) abi="armeabi-v7a" ;;
              *x86_64*) abi="x86_64" ;;
              *x86*) abi="x86" ;;
              *universal*) abi="universal" ;;
              *) echo "::error::Unknown APK ABI for $file"; exit 1 ;;
            esac
            cp "$apk" "release/CardVault_${version}_${abi}.apk"
          done
          test -n "$(find release -name '*.apk' -print -quit)"
          (cd release && sha256sum *.apk > SHA256SUMS.txt)
          notes_source=".github/release-notes/${tag}.md"
          if [ -f "$notes_source" ]; then
            cp "$notes_source" release/RELEASE_NOTES.md
          else
            {
              echo "## ✨ 新增"
              echo
              echo "- 发布 ${tag} 签名安装包。"
            } > release/RELEASE_NOTES.md
          fi
          {
            echo
            echo "## 📦 安装包"
            echo
            find release -name '*.apk' -printf '%f\n' | sort | sed 's/^/- /'
          } >> release/RELEASE_NOTES.md

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: CardVault-${{ github.ref_name }}-release-apks
          path: |
            release/*.apk
            release/SHA256SUMS.txt
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release view "$TAG_NAME" --repo "$GITHUB_REPOSITORY" --json assets --jq '.assets[].name' |
              while read -r asset; do
                case "$asset" in
                  CardVault*.apk|SHA256SUMS.txt)
                    gh release delete-asset "$TAG_NAME" "$asset" --repo "$GITHUB_REPOSITORY" -y
                    ;;
                esac
              done
            gh release edit "$TAG_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --title "CardVault $TAG_NAME" \
              --notes-file release/RELEASE_NOTES.md
            gh release upload "$TAG_NAME" release/*.apk release/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$TAG_NAME" release/*.apk release/SHA256SUMS.txt \
              --repo "$GITHUB_REPOSITORY" \
              --title "CardVault $TAG_NAME" \
              --notes-file release/RELEASE_NOTES.md \
              --verify-tag
          fi
